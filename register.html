<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Test | Register</title>
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 10px; }
        .card { background: #121212; padding: 25px; border-radius: 35px; max-width: 450px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.1); }
        input { width: 85%; padding: 15px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
        .btn-wa { background: #25d366; color: white; border: none; padding: 18px; border-radius: 20px; font-weight: bold; width: 95%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:var(--glow);">إنشاء حساب مختبر 👑</h2>
        <input type="text" id="rName" placeholder="اسم العيادة">
        <input type="text" id="rUser" placeholder="اسم المستخدم (إنجليزي)">
        <input type="password" id="rPass" placeholder="كلمة المرور">
        <div style="margin: 20px 0; border-top: 1px dashed #333; padding-top:10px;">
            <p style="font-size: 22px; font-weight: bold; color: #ffd700; text-shadow: 0 0 15px rgba(255,215,0,0.6);">👑 المهندس صوفي (Sofygram)</p>
        </div>
        <button class="btn-wa" onclick="reg()">تفعيل عبر واتساب 🟢</button>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://testsofygramtest-default-rtdb.firebaseio.com" }));
        window.reg = () => {
            const n=document.getElementById('rName').value, u=document.getElementById('rUser').value, p=document.getElementById('rPass').value;
            if(!n || !u || !p) return alert("امسح الحقول!");
            set(ref(db, 'users/' + u), { name: n, password: p, active: false, currentNum: 0, status: "بانتظار التفعيل ⏳" }).then(() => {
                window.location.href = `https://wa.me/9647807466488?text=تفعيل حساب مختبر: ${n}`;
            });
        };
    </script>
</body>
</html>
