<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Test | Admin</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; }
        .card { background: #121212; padding: 25px; border-radius: 30px; max-width: 400px; margin: 20px auto; border: 1px solid #2ecc71; }
        .num { font-size: 80px; font-weight: bold; color: #2ecc71; }
        .chat-box { background: rgba(0, 255, 128, 0.05); border: 2px solid #00ff80; border-radius: 20px; padding: 15px; margin-top: 20px; }
        #chat { height: 100px; overflow-y: auto; text-align: right; border-bottom: 1px solid #333; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="login">
        <div class="card">
            <h2>دخول السكرتير (Test) 🔐</h2>
            <input type="text" id="user" placeholder="المستخدم" style="width:80%; padding:10px; margin:5px;">
            <input type="password" id="pass" placeholder="الرمز" style="width:80%; padding:10px; margin:5px;">
            <button onclick="login()">دخول</button>
        </div>
    </div>
    <div id="main" style="display:none;">
        <div class="card">
            <h3 id="cName">العيادة</h3>
            <div class="num" id="cur">0</div>
            <button onclick="upd(1)" style="font-size:30px; padding:10px 30px;">+</button>
            <button onclick="upd(-1)" style="font-size:30px; padding:10px 30px;">-</button>
        </div>
        <div class="card chat-box">
            <div id="chat"></div>
            <input type="text" id="reply" placeholder="رد على المراجع..." style="width:70%;">
            <button onclick="send()">رد</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://testsofygramtest-default-rtdb.firebaseio.com" }));
        let id = "";
        window.login = async () => {
            const u=document.getElementById('user').value, p=document.getElementById('pass').value;
            const snap = await get(ref(db, `users/${u}`));
            if(snap.exists() && snap.val().password === p) {
                id=u; document.getElementById('login').style.display='none'; document.getElementById('main').style.display='block';
                onValue(ref(db, `users/${id}`), s => document.getElementById('cur').innerText = s.val().currentNum);
                onValue(ref(db, `chats/${id}`), s => {
                    const d = document.getElementById('chat'); d.innerHTML = "";
                    for(let k in s.val()){ const m=s.val()[k]; d.innerHTML += `<div><b>${m.sender}:</b> ${m.text}</div>`; }
                    d.scrollTop = d.scrollHeight;
                });
            }
        };
        window.upd = v => update(ref(db, `users/${id}`), { currentNum: parseInt(document.getElementById('cur').innerText)+v });
        window.send = () => { push(ref(db, `chats/${id}`), { sender: 'secretary', text: document.getElementById('reply').value }); document.getElementById('reply').value=""; };
    </script>
</body>
</html>
