<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Admin | إدارة النشاط ⚡</title>
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        .admin-card { background: #121212; padding: 25px; border-radius: 30px; max-width: 450px; margin: auto; border: 1px solid var(--glow); }
        .num-display { font-size: 110px; font-weight: bold; color: #fff; margin: 10px 0; }
        .btn-round { width: 80px; height: 80px; border-radius: 50%; border: none; font-size: 40px; cursor: pointer; color: white; margin: 10px; }
        .plus { background: #2ecc71; } .minus { background: #e74c3c; }
        .chat-area { background: rgba(0, 255, 128, 0.05); border: 2px solid #00ff80; border-radius: 20px; padding: 15px; margin-top: 20px; }
        #chatBox { height: 120px; overflow-y: auto; text-align: right; border-bottom: 1px solid #333; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loginBox" class="admin-card">
        <h2>دخول السكرتارية 🔐</h2>
        <input type="text" id="u" placeholder="اسم المستخدم" style="width:80%; padding:10px; margin:5px;">
        <input type="password" id="p" placeholder="كلمة المرور" style="width:80%; padding:10px; margin:5px;">
        <button onclick="login()" style="width:85%; padding:12px; background:var(--glow); border:none; border-radius:10px; font-weight:bold;">دخول</button>
    </div>

    <div id="controlBox" class="admin-card" style="display:none;">
        <h2 id="cName" style="color:var(--glow);"></h2>
        <div class="num-display" id="n">0</div>
        <div style="display:flex; justify-content:center;">
            <button class="btn-round minus" onclick="ch(-1)">-</button>
            <button class="btn-round plus" onclick="ch(1)">+</button>
        </div>

        <div class="chat-area">
            <div id="chatBox"></div>
            <input type="text" id="reply" placeholder="رد على المراجع..." style="width:70%; padding:8px;">
            <button onclick="sendMsg()" style="padding:8px; background:#00ff80; border:none; border-radius:8px;">رد</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, get, child, update, onValue, push } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let curUser = ""; let curNum = 0;

        window.login = () => {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            get(child(ref(db), `users/${user}`)).then((s) => {
                if(s.exists() && s.val().password == pass) {
                    curUser = user;
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('controlBox').style.display = 'block';
                    onValue(ref(db, `users/${curUser}`), (snap) => {
                        document.getElementById('n').innerText = snap.val().currentNum || 0;
                        document.getElementById('cName').innerText = snap.val().name;
                        curNum = snap.val().currentNum;
                    });
                    // استلام الدردشة
                    onValue(ref(db, `chats/${curUser}`), s => {
                        const d = document.getElementById('chatBox'); d.innerHTML = "";
                        for(let k in s.val()){ const m=s.val()[k]; d.innerHTML += `<div style="color:${m.sender=='secretary'?'#00ff80':'#fff'}"><b>${m.sender=='secretary'?'أنا':'مراجع'}:</b> ${m.text}</div>`; }
                        d.scrollTop = d.scrollHeight;
                    });
                } else alert("بيانات خاطئة!");
            });
        };

        window.ch = (v) => { update(ref(db, `users/${curUser}`), { currentNum: curNum + v }); };
        window.sendMsg = () => { 
            push(ref(db, `chats/${curUser}`), { sender: 'secretary', text: document.getElementById('reply').value });
            document.getElementById('reply').value = "";
        };
    </script>
</body>
</html>
