<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";
    const db = getDatabase(initializeApp({ databaseURL: "https://testsofygramtest-default-rtdb.firebaseio.com" }));
    let id = "";

    window.login = async () => {
        const u=document.getElementById('user').value, p=document.getElementById('pass').value;
        const snap = await get(ref(db, `users/${u}`));
        if(snap.exists() && snap.val().password === p) {
            id=u; document.getElementById('login').style.display='none'; document.getElementById('main').style.display='block';
            onValue(ref(db, `users/${id}`), s => document.getElementById('cur').innerText = s.val().currentNum);
            onValue(ref(db, `chats/${id}`), s => {
                const d = document.getElementById('chat'); d.innerHTML = "";
                const data = s.val();
                for(let k in data){ 
                    const m = data[k];
                    const senderName = m.sender === 'secretary' ? '<span style="color:#00ff80;">أنا (السكرتير)</span>' : '<span style="color:#fff;">مراجع</span>';
                    d.innerHTML += `<div style="margin-bottom:8px;"><b>${senderName}:</b> ${m.text}</div>`;
                }
                d.scrollTop = d.scrollHeight;
            });
        } else { alert("خطأ في بيانات الدخول!"); }
    };

    window.upd = v => update(ref(db, `users/${id}`), { currentNum: Math.max(0, parseInt(document.getElementById('cur').innerText)+v) });
    window.send = () => { 
        const txt = document.getElementById('reply').value;
        if(!txt) return;
        push(ref(db, `chats/${id}`), { sender: 'secretary', text: txt }); 
        document.getElementById('reply').value=""; 
    };
</script>
