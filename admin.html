<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Admin | لوحة السكرتاريا الذكية 📋</title>
    <style>
        :root { --glow: #2ecc71; --chat: #00ff80; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .admin-card { background: #121212; padding: 25px; border-radius: 30px; max-width: 400px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
        
        .num-display { font-size: 80px; font-weight: bold; color: var(--glow); text-shadow: 0 0 15px rgba(46, 204, 113, 0.4); margin: 10px 0; }
        .btn-action { background: var(--glow); color: white; border: none; padding: 20px; width: 45%; border-radius: 20px; font-size: 24px; font-weight: bold; cursor: pointer; margin: 5px; box-shadow: 0 4px 0 #27ae60; }
        .btn-action:active { transform: translateY(3px); box-shadow: none; }

        /* نظام الدردشة الفسفوري للسكرتير */
        .admin-chat-box { 
            background: rgba(0, 255, 128, 0.05); 
            border: 2px solid var(--chat); 
            border-radius: 25px; 
            padding: 15px; 
            margin-top: 25px; 
            box-shadow: 0 0 15px rgba(0, 255, 128, 0.1);
        }
        #adminChatDisplay { height: 150px; overflow-y: auto; text-align: right; font-size: 13px; border-bottom: 1px solid #333; margin-bottom: 10px; padding: 5px; }
        .chat-input-group { display: flex; gap: 5px; }
        .chat-input-group input { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        .btn-reply { background: var(--chat); color: #000; border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginBox" class="admin-card">
        <h2 style="color:var(--glow);">دخول السكرتير 🔐</h2>
        <input type="text" id="uName" placeholder="اسم المستخدم" style="width:85%; padding:15px; margin-bottom:10px; border-radius:15px; background:#000; color:#fff; border:1px solid #333;">
        <input type="password" id="uPass" placeholder="كلمة المرور" style="width:85%; padding:15px; margin-bottom:15px; border-radius:15px; background:#000; color:#fff; border:1px solid #333;">
        <button onclick="login()" style="width:90%; padding:15px; border-radius:15px; background:var(--glow); border:none; font-weight:bold; cursor:pointer;">دخول</button>
    </div>

    <div id="controlBox" style="display:none;">
        <div class="admin-card">
            <h3 id="displayTitle">العيادة</h3>
            <div class="num-display" id="curNum">0</div>
            <div style="display:flex; justify-content: center;">
                <button class="btn-action" onclick="changeNum(1)">+</button>
                <button class="btn-action" onclick="changeNum(-1)" style="background:#e74c3c; box-shadow: 0 4px 0 #c0392b;">-</button>
            </div>
            <button onclick="resetNum()" style="background:none; color:#888; border:none; margin-top:15px; cursor:pointer;">إعادة تصغير الرقم لـ 0</button>
        </div>

        <div class="admin-card admin-chat-box">
            <div style="color:var(--chat); font-weight:bold; margin-bottom:10px; text-align: right;">💬 رسائل المراجعين الواردة</div>
            <div id="adminChatDisplay">
                <p style="color:#444;">لا توجد رسائل حالياً...</p>
            </div>
            <div class="chat-input-group">
                <input type="text" id="adminReplyInput" placeholder="رد على المراجع...">
                <button class="btn-reply" onclick="replyToPatient()">رد</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAgacmgprp9HYJCcUwVnd3yiKGpoy5k-Q8",
            authDomain: "testsofygramtest.firebaseapp.com",
            databaseURL: "https://testsofygramtest-default-rtdb.firebaseio.com",
            projectId: "testsofygramtest",
            storageBucket: "testsofygramtest.firebasestorage.app",
            messagingSenderId: "105770464383",
            appId: "1:105770464383:web:1f1ad1ad2d9cc2bf9ebb4a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentClinicId = "";

        window.login = async () => {
            const user = document.getElementById('uName').value;
            const pass = document.getElementById('uPass').value;
            const snap = await get(ref(db, `users/${user}`));
            if(snap.exists() && snap.val().password === pass) {
                currentClinicId = user;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('controlBox').style.display = 'block';
                document.getElementById('displayTitle').innerText = snap.val().name;
                loadData();
                listenToChat();
            } else { alert("خطأ في البيانات!"); }
        };

        function loadData() {
            onValue(ref(db, `users/${currentClinicId}`), (snap) => {
                document.getElementById('curNum').innerText = snap.val().currentNum || 0;
            });
        }

        window.changeNum = (val) => {
            const el = document.getElementById('curNum');
            let newNum = parseInt(el.innerText) + val;
            if(newNum < 0) newNum = 0;
            update(ref(db, `users/${currentClinicId}`), { currentNum: newNum });
        };

        window.resetNum = () => { if(confirm("تصفير؟")) update(ref(db, `users/${currentClinicId}`), { currentNum: 0 }); };

        // --- نظام دردشة السكرتير ---
        function listenToChat() {
            onValue(ref(db, `chats/${currentClinicId}`), (snap) => {
                const data = snap.val();
                const display = document.getElementById('adminChatDisplay');
                display.innerHTML = "";
                if(!data) { display.innerHTML = "<p style='color:#444;'>لا توجد رسائل...</p>"; return; }
                
                for(let k in data) {
                    const m = data[k];
                    const color = m.sender === 'patient' ? '#fff' : '#00ff80';
                    const name = m.sender === 'patient' ? 'مراجع' : 'أنا';
                    display.innerHTML += `<div style="margin-bottom:8px; color:${color};"><b>${name}:</b> ${m.text}</div>`;
                }
                display.scrollTop = display.scrollHeight;
            });
        }

        window.replyToPatient = () => {
            const txt = document.getElementById('adminReplyInput').value;
            if(!txt || !currentClinicId) return;
            push(ref(db, `chats/${currentClinicId}`), {
                sender: 'secretary',
                text: txt,
                time: new Date().toLocaleTimeString()
            });
            document.getElementById('adminReplyInput').value = "";
        };
    </script>
</body>
</html>
