<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | المشاهد 📺</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding-bottom: 50px; }
        .num-circle { width: 160px; height: 160px; border: 5px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 80px; margin: 30px auto; box-shadow: 0 0 30px #e74c3c; color: white; font-weight: bold; }
        .chat-glow { background: rgba(0, 255, 128, 0.05); border: 2px solid #00ff80; border-radius: 25px; padding: 15px; max-width: 330px; margin: 20px auto; }
    </style>
</head>
<body>
    <audio id="metro" src="https://top4top.io/s_2210u6mzo1.mp3"></audio>

    <h2 id="name" style="color:#ffd700; margin-top:30px;">جاري التحميل...</h2>
    <div class="num-circle" id="n">0</div>
    <button onclick="document.getElementById('metro').play()" style="background:none; border:none; font-size:30px; cursor:pointer;">🔔</button>

    <div class="chat-glow">
        <div id="chat" style="height:110px; overflow-y:auto; text-align:right; margin-bottom:10px;"></div>
        <input type="text" id="msg" placeholder="اسأل السكرتير..." style="width:65%; padding:10px; border-radius:10px;">
        <button onclick="send()" style="padding:10px; background:#00ff80; border:none; border-radius:10px; font-weight:bold;">إرسال</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" }));
        const id = new URLSearchParams(window.location.search).get('id');

        if(id) {
            onValue(ref(db, `users/${id}`), s => {
                if(document.getElementById('n').innerText != s.val().currentNum) document.getElementById('metro').play();
                document.getElementById('n').innerText = s.val().currentNum;
                document.getElementById('name').innerText = s.val().name;
            });
            onValue(ref(db, `chats/${id}`), s => {
                const d = document.getElementById('chat'); d.innerHTML = "";
                for(let k in s.val()){ const m=s.val()[k]; d.innerHTML += `<div style="color:${m.sender=='patient'?'#fff':'#00ff80'}"><b>${m.sender=='patient'?'أنا':'السكرتير'}:</b> ${m.text}</div>`; }
                d.scrollTop = d.scrollHeight;
            });
        }
        window.send = () => { push(ref(db, `chats/${id}`), { sender: 'patient', text: document.getElementById('msg').value }); document.getElementById('msg').value=""; };
    </script>
</body>
</html>
