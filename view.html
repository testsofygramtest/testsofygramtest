<div id="chatBox" class="chat-glow-box">
    <div class="chat-title">💬 مراسلة العيادة (استفسار سريع)</div>
    <div id="chatDisplay" style="height: 100px; overflow-y: auto; text-align: right; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #222;">
        <p style="color: #666;">اكتب رسالتك وسيرد عليك السكرتير هنا...</p>
    </div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="msgInput" placeholder="اكتب هنا..." style="flex: 1; margin: 0; padding: 10px; font-size: 14px; border-color: #00ff80;">
        <button onclick="sendMsg()" style="width: auto; padding: 10px 20px; background: #00ff80; color: black; border-radius: 12px; font-weight: bold; cursor: pointer; border: none;">إرسال</button>
    </div>
</div>

<style>
    .chat-glow-box { 
        background: rgba(0, 255, 128, 0.05); 
        border: 2px solid #00ff80; 
        border-radius: 25px; 
        padding: 20px; 
        max-width: 320px; 
        margin: 20px auto; 
        box-shadow: 0 0 15px rgba(0, 255, 128, 0.2); 
        animation: glowPulse 2s infinite;
    }
    @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 10px #00ff8044; } 50% { box-shadow: 0 0 25px #00ff8088; } }
    .chat-title { color: #00ff80; font-size: 15px; font-weight: bold; margin-bottom: 10px; text-align: right; }
</style>
