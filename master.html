<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sofygram Master | الملك 👑</title>
    <style>
        body { background: #050a14; color: #ffd700; font-family: sans-serif; text-align: center; padding: 20px; }
        .master-card { background: #121212; border: 2px solid #ffd700; border-radius: 30px; padding: 25px; max-width: 600px; margin: 20px auto; }
        .user-row { background: #000; border: 1px solid #333; padding: 15px; margin: 10px 0; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        input, textarea { width: 90%; padding: 12px; margin: 8px 0; border-radius: 12px; background: #000; color: #fff; border: 1px solid #333; text-align: center; }
        .btn-act { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; }
        .btn-stop { background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; }
        .btn-pub { background: #ffd700; color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 95%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>👑 لوحة التحكم الملكية - صوفيگرام</h1>

    <div class="master-card" style="border-color: #2ecc71;">
        <h2 style="color:#2ecc71;">📢 إدارة المحتوى (فيديو + إعلانات)</h2>
        <div style="text-align: right; padding: 0 15px;">
            <label>اسم ملف الفيديو (مثلاً 1V.mp4):</label>
            <input type="text" id="vUrl">
            <label>إعلان الشريط العلوي:</label>
            <textarea id="topMsg" placeholder="اكتب إعلان يظهر لكل الزوار"></textarea>
        </div>
        <button onclick="publish()" class="btn-pub">نشر التحديثات للموقع فوراً 🚀</button>
    </div>

    <div class="master-card">
        <h2>👥 إدارة المشتركين</h2>
        <div id="list">جاري التحميل...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // وظيفة النشر
        window.publish = () => {
            update(ref(db, 'site_settings'), {
                currentVideo: document.getElementById('vUrl').value,
                topAlert: document.getElementById('topMsg').value
            }).then(() => alert("تم التحديث بنجاح! 🌍"));
        };

        // جلب الإعدادات الحالية
        onValue(ref(db, 'site_settings'), s => {
            if(s.exists()){
                document.getElementById('vUrl').value = s.val().currentVideo || "";
                document.getElementById('topMsg').value = s.val().topAlert || "";
            }
        });

        // جلب المشتركين
        onValue(ref(db, 'users'), snap => {
            const list = document.getElementById('list'); list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                const u = data[id];
                list.innerHTML += `<div class="user-row">
                    <div style="text-align:right;">
                        <b>${u.name}</b><br>
                        <small>ID: ${id} | Pass: ${u.password}</small>
                    </div>
                    <div>
                        <button class="btn-act" onclick="act('${id}', true)">تفعيل</button>
                        <button class="btn-stop" onclick="act('${id}', false)">إيقاف</button>
                    </div>
                    <span style="color:${u.active ? '#2ecc71' : '#e74c3c'}">${u.active ? 'نشط' : 'متوقف'}</span>
                </div>`;
            }
        });
        window.act = (id, s) => update(ref(db, `users/${id}`), { active: s, status: s ? "🟢 مفتوح الآن | Open" : "🔴 مغلق | Closed" });
    </script>
</body>
</html>
