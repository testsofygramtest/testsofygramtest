<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Master Control</title>
</head>
<body style="background:#000; color:#ffd700; text-align:center;">
    <h1>👑 لوحة التحكم الملكية (Test)</h1>
    <div id="list"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://testsofygramtest-default-rtdb.firebaseio.com" }));
        onValue(ref(db, 'users'), snap => {
            const list = document.getElementById('list'); list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                list.innerHTML += `<div style="border:1px solid #333; margin:10px; padding:10px;">
                    <span>${data[id].name}</span>
                    <button onclick="act('${id}', true)">تفعيل</button>
                    <button onclick="act('${id}', false)">إيقاف</button>
                    <span>الحالة: ${data[id].active}</span>
                </div>`;
            }
        });
        window.act = (id, s) => update(ref(db, `users/${id}`), { active: s, status: s ? "مفتوح ✅" : "مغلق ❌" });
    </script>
</body>
</html>
