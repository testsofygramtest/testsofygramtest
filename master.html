<div class="master-card" style="margin-top:30px; border-color: #2ecc71;">
    <h2 style="color:#2ecc71;">📢 إدارة محتوى الموقع (بدون كود)</h2>
    <div style="text-align: right; padding: 10px;">
        <label>اسم ملف الفيديو (مثلاً 1V.MP4):</label><br>
        <input type="text" id="vidUrl" style="width:90%;"><br>
        <label>إعلان الشريط العلوي:</label><br>
        <input type="text" id="siteAlert" style="width:90%;" placeholder="مثلاً: خصم 50% للمشتركين الجدد">
    </div>
    <button onclick="updateSite()" class="btn-act" style="width:90%; margin-bottom:10px;">حفظ ونشر التغييرات 🚀</button>
</div>

<script type="module">
    // ... الكود السابق لفايربيس ...
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";
    const db = getDatabase();

    window.updateSite = () => {
        const v = document.getElementById('vidUrl').value;
        const a = document.getElementById('siteAlert').value;
        update(ref(db, 'site_settings'), { mainVideo: v, topAlert: a }).then(() => alert("تم النشر بنجاح! 🌍"));
    };

    // لجلب القيم الحالية عند فتح الصفحة
    onValue(ref(db, 'site_settings'), s => {
        if(s.exists()){
            document.getElementById('vidUrl').value = s.val().mainVideo || "";
            document.getElementById('siteAlert').value = s.val().topAlert || "";
        }
    });
</script>
