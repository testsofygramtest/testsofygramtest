<script type="module">
    // ... الكود السابق ...
    window.search = async () => {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const snap = await get(ref(db, 'users'));
        const data = snap.val();
        const resDiv = document.getElementById('results'); resDiv.innerHTML = "";
        
        let count = 0;
        for(let key in data) {
            if(data[key].name.toLowerCase().includes(val) && count < 4) { // حصر البحث بأول 4 كأولوية
                resDiv.innerHTML += `
                <div class="res-item" onclick="window.location.href='view.html?id=${key}'" 
                     style="background:#1a1a1a; padding:15px; margin:10px; border-radius:15px; border:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
                    <span>⭐ ${data[key].name}</span>
                    <span style="color:#ffd700; font-size:12px;">انقر للمشاهدة</span>
                </div>`;
                count++;
            }
        }
    };
</script>
