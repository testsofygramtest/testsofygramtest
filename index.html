<div id="alertBar" style="background: #e74c3c; color: white; padding: 10px; display: none; font-weight: bold;"></div>

<section class="hero">
    <img src="logo.png" style="width: 120px;">
    <h1 id="mainTitle">صوفيگرام | ذكاء الطوابير 🌍</h1>
    
    <video id="dynamicVideo" class="promo-video" controls style="width: 100%; max-width: 350px; border: 3px solid #ffd700; border-radius: 20px;">
        <source id="videoSource" src="1V.MP4" type="video/mp4">
    </video>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";
    const db = getDatabase(initializeApp({ databaseURL: "https://testsofygramtest-default-rtdb.firebaseio.com" }));

    // الربط الذكي: مراقبة تغييرات الماستر
    onValue(ref(db, 'site_settings'), (snap) => {
        const data = snap.val();
        if(data) {
            // تحديث الفيديو
            if(data.mainVideo) {
                const video = document.getElementById('dynamicVideo');
                const source = document.getElementById('videoSource');
                if(source.src.indexOf(data.mainVideo) === -1) {
                   source.src = data.mainVideo;
                   video.load(); // إعادة تحميل الفيديو الجديد
                }
            }
            // تحديث الشريط الإعلاني
            if(data.topAlert) {
                const bar = document.getElementById('alertBar');
                bar.innerText = data.topAlert;
                bar.style.display = 'block';
            }
        }
    });
</script>
