<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوفيگرام | المختبر الذكي 🧪</title>
    <style>
        :root { --gold: #ffd700; --bg: #050a14; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        /* شريط الإعلانات المتحرك */
        #topAlert { background: #e74c3c; color: white; padding: 12px; font-weight: bold; display: none; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }

        .hero { padding: 40px 20px; }
        .promo-video { width: 95%; max-width: 350px; border: 3px solid var(--gold); border-radius: 25px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); transition: 0.5s; }

        .search-box { background: #0c1525; padding: 40px 20px; border-radius: 50px 50px 0 0; margin-top: 30px; }
        input { width: 85%; padding: 18px; border-radius: 15px; border: 1px solid var(--gold); background: #000; color: #fff; font-size: 18px; text-align: center; outline: none; }
        
        .result-item { background: #121212; padding: 20px; margin: 15px auto; max-width: 400px; border-radius: 20px; border-right: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="topAlert"></div>

    <section class="hero">
        <img src="logo.png" style="width: 120px; margin-bottom: 15px;">
        <h1 style="color: var(--gold);">صوفيگرام (نسخة التجربة) 🚀</h1>
        <p id="lastUpdate" style="font-size: 10px; color: #555;"></p>

        <div id="videoContainer">
            <video id="mainVideo" class="promo-video" controls poster="poster.jpg">
                <source id="videoSource" src="1V.MP4" type="video/mp4">
                متصفحك لا يدعم الفيديو.
            </video>
        </div>

        <div style="margin-top: 20px;">
            <a href="register.html" style="background:var(--gold); color:black; padding:12px 25px; border-radius:12px; text-decoration:none; font-weight:bold;">سجل نشاطك الآن</a>
        </div>
    </section>

    <section class="search-box">
        <h3>🔎 ابحث عن نشاطك المفضل</h3>
        <input type="text" id="searchInput" placeholder="اكتب الاسم هنا..." onkeyup="doSearch()">
        <div id="results" style="margin-top: 25px;"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAgacmgprp9HYJCcUwVnd3yiKGpoy5k-Q8",
            authDomain: "testsofygramtest.firebaseapp.com",
            databaseURL: "https://testsofygramtest-default-rtdb.firebaseio.com",
            projectId: "testsofygramtest",
            appId: "1:105770464383:web:1f1ad1ad2d9cc2bf9ebb4a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- السحر هنا: مراقبة لوحة الماستر ---
        onValue(ref(db, 'site_config'), (snap) => {
            const config = snap.val();
            if(!config) return;

            // 1. تحديث الإعلان العلوي
            const bar = document.getElementById('topAlert');
            if(config.topAlert) {
                bar.innerText = config.topAlert;
                bar.style.display = 'block';
            } else {
                bar.style.display = 'none';
            }

            // 2. تحديث الفيديو بدون رفرش الصفحة كاملة
            if(config.currentVideo) {
                const video = document.getElementById('mainVideo');
                const source = document.getElementById('videoSource');
                const newSrc = config.currentVideo;

                // إذا تغير اسم الملف، نحدث المصدر
                if(!source.src.includes(newSrc)) {
                    source.src = newSrc;
                    video.load(); // أمر إعادة تحميل الفيديو الجديد
                    console.log("تم تحديث الفيديو إلى: " + newSrc);
                }
            }
            document.getElementById('lastUpdate').innerText = "آخر تحديث للمحتوى: " + (config.lastUpdate || "");
        });

        // --- وظيفة البحث عن الأنشطة (أول 4 نتائج) ---
        window.doSearch = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            if(val.length < 2) { document.getElementById('results').innerHTML = ""; return; }
            
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            const resDiv = document.getElementById('results'); resDiv.innerHTML = "";
            
            let count = 0;
            for(let key in data) {
                if(data[key].name.toLowerCase().includes(val) && count < 4) {
                    resDiv.innerHTML += `
                        <div class="result-item" onclick="window.location.href='view.html?id=${key}'">
                            <b>⭐ ${data[key].name}</b>
                            <span style="color:var(--gold); font-size:12px;">دخول ➔</span>
                        </div>`;
                    count++;
                }
            }
        };
    </script>
</body>
</html>
